<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.A.G.E. | Movimentações</title>
<link rel="stylesheet" href="assets/vendor/bootstrap/bootstrap.min.css">
<link rel="stylesheet" href="assets/css/base.css">
<link rel="stylesheet" href="assets/css/layout.css">
<link rel="stylesheet" href="assets/css/components.css">
<link rel="stylesheet" href="assets/css/pages.css">
</head>
<body data-page="movimentacoes" data-crumb="MOVIMENTAÇÕES">
    <div id="sidebar-root"></div>

    <main class="sage-app">
        <div id="topbar-root"></div>

        <section class="sage-content sage-content-center page-enter">
            <div class="sage-page-title sage-page-title-row">
    <div>
        <h1>Movimentações</h1>
        <p>Registre entradas e saídas de peças no estoque.</p>
    </div>

    <div class="d-flex gap-2 flex-wrap">
        <button class="sage-btn sage-btn-success-soft" type="button" data-modal-open="#entryModal">
            ↙ Nova Entrada
        </button>

        <button class="sage-btn sage-btn-danger-soft" type="button" data-modal-open="#exitModal">
            ↗ Nova Saída
        </button>
    </div>
</div>

<article class="sage-panel">
    <div class="sage-toolbar">
        <label class="sage-search">
            <span data-icon="search"></span>
            <input type="search" data-empty-search="[data-movements-table]" placeholder="Buscar por peça, código ou OS...">
        </label>
    </div>

    <div class="table-responsive">
        <table class="sage-table">
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Tipo</th>
                    <th>Peça / Produto</th>
                    <th>Quantidade</th>
                    <th>Motivo / OS</th>
                </tr>
            </thead>
            <tbody data-movements-table data-colspan="5"></tbody>
        </table>
    </div>
</article>

<div class="sage-modal-layer" id="entryModal" aria-hidden="true">
    <div class="sage-modal-backdrop" data-modal-close></div>

    <form class="sage-modal-dialog" action="/movements/entry" method="post" data-sage-form="entry" novalidate>
        <header class="sage-modal-header sage-modal-header-success">
            <div class="panel-title">
                <span class="panel-icon panel-icon-green" data-icon="entry"></span>
                <div>
                    <h2>Nova Entrada de Estoque</h2>
                    <p>Preencha os detalhes da movimentação.</p>
                </div>
            </div>

            <button class="sage-modal-close" type="button" data-modal-close aria-label="Fechar">×</button>
        </header>

        <div class="sage-modal-body">
            <label class="sage-field">
                <span>Selecione a Peça</span>
                <div class="sage-select-shell">
                    <span data-icon="box"></span>
                    <select name="part_id" data-part-select>
                        <option value="">Escolha uma peça do inventário...</option>
                    </select>
                </div>
            </label>

            <div class="sage-form-grid-2">
                <label class="sage-field">
                    <span>Quantidade</span>
                    <input name="quantity" type="number" min="1" placeholder="Ex: 2" required>
                    <small class="sage-field-error">Informe uma quantidade válida.</small>
                </label>

                <label class="sage-field">
                    <span>Data</span>
                    <input name="movement_date" type="date" required>
                    <small class="sage-field-error">Informe a data.</small>
                </label>
            </div>

            <label class="sage-field">
                <span>Motivo da Entrada</span>
                <input name="reason" type="text" placeholder="Ex: Compra do fornecedor X (NF: 1234)" required>
                <small class="sage-field-error">Informe o motivo da entrada.</small>
            </label>

            <label class="sage-field">
                <span>Fornecedor (Opcional)</span>
                <input name="supplier" type="text" placeholder="Ex: Auto Peças Brasil">
            </label>

            <div class="sage-feedback" data-form-feedback></div>
        </div>

        <footer class="sage-modal-footer">
            <button type="button" class="sage-btn sage-btn-ghost" data-modal-close>Cancelar</button>
            <button type="submit" class="sage-btn sage-btn-primary">
                <span data-icon="save"></span>
                Confirmar Entrada
            </button>
        </footer>
    </form>
</div>

<div class="sage-modal-layer" id="exitModal" aria-hidden="true">
    <div class="sage-modal-backdrop" data-modal-close></div>

    <form class="sage-modal-dialog" action="/movements/exit" method="post" data-sage-form="exit" novalidate>
        <header class="sage-modal-header sage-modal-header-danger">
            <div class="panel-title">
                <span class="panel-icon panel-icon-danger" data-icon="exit"></span>
                <div>
                    <h2>Nova Saída de Estoque</h2>
                    <p>Preencha os detalhes da movimentação.</p>
                </div>
            </div>

            <button class="sage-modal-close" type="button" data-modal-close aria-label="Fechar">×</button>
        </header>

        <div class="sage-modal-body">
            <label class="sage-field">
                <span>Selecione a Peça</span>
                <div class="sage-select-shell">
                    <span data-icon="box"></span>
                    <select name="part_id" data-part-select>
                        <option value="">Escolha uma peça do inventário...</option>
                    </select>
                </div>
            </label>

            <div class="sage-form-grid-2">
                <label class="sage-field">
                    <span>Quantidade</span>
                    <input name="quantity" type="number" min="1" placeholder="Ex: 2" required>
                    <small class="sage-field-error">Informe uma quantidade válida.</small>
                </label>

                <label class="sage-field">
                    <span>Data</span>
                    <input name="movement_date" type="date" required>
                    <small class="sage-field-error">Informe a data.</small>
                </label>
            </div>

            <label class="sage-field">
                <span>Descrição do Serviço / Motivo</span>
                <input name="reason" type="text" placeholder="Ex: Troca de óleo e filtro" required>
                <small class="sage-field-error">Informe o motivo da saída.</small>
            </label>

            <label class="sage-field">
                <span>Ordem de Serviço (OS)</span>
                <input name="service_order" type="text" placeholder="Ex: 1052">
            </label>

            <div class="sage-feedback" data-form-feedback></div>
        </div>

        <footer class="sage-modal-footer">
            <button type="button" class="sage-btn sage-btn-ghost" data-modal-close>Cancelar</button>
            <button type="submit" class="sage-btn sage-btn-primary">
                <span data-icon="save"></span>
                Confirmar Saída
            </button>
        </footer>
    </form>
</div>
        </section>
    </main>

    <script src="assets/vendor/bootstrap/bootstrap.bundle.min.js"></script>
<script src="assets/js/core/utils.js"></script>
<script src="assets/js/components/icons.js"></script>
<script src="assets/js/components/sidebar.js"></script>
<script src="assets/js/components/topbar.js"></script>
<script src="assets/js/components/emptyState.js"></script>
<script src="assets/js/components/modal.js"></script>
<script src="assets/js/core/api.js"></script>
<script src="assets/js/core/app.js"></script>
<script src="assets/js/pages/movimentacoes.js"></script>
</body>
</html>
